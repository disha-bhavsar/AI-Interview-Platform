<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#141e30,#243b55,#00c6ff,#0072ff);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:white;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:450px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:10px;
}

p{
    margin-bottom:25px;
    color:#ddd;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.interview{
    background:#00c6ff;
}

.resume{
    background:#9b59b6;
}

.history{
    background:#2ecc71;
}

.logout{
    background:#e74c3c;
}

</style>
</head>

<body>

<div class="card">

    <h1 id="welcome">
        Welcome
    </h1>

    <p>
        AI Interview Platform Dashboard
    </p>

    <div class="buttons">

        <button class="interview"
                onclick="startInterviewPage()">

            Start Interview

        </button>

        <button class="resume"
                onclick="openResumeAnalyzer()">

            Resume Analyzer

        </button>

       
        <button class="logout"
                onclick="logoutUser()">

            Logout

        </button>

    </div>

</div>

<script>

window.onload = function(){

    const email =
    localStorage.getItem("email");

    if(email){

        document.getElementById("welcome")
        .innerText =
        "Welcome, " +
        email.split("@")[0];
    }
}

function startInterviewPage(){

    window.location.href =
    "interview.html";
}

function openResumeAnalyzer(){

    window.location.href =
    "resume.html";
}

function viewHistory(){

    window.location.href =
    "history.html";
}

function logoutUser(){

    localStorage.clear();

    window.location.href =
    "login.html";
}

</script>

</body>
</html>
